# Meson cross-compilation file for VeridianOS
#
# Usage:
#   meson setup builddir --cross-file userland/libc/meson-veridian-cross.ini
#
# This file is used when cross-compiling Mesa, libepoxy, FreeType, HarfBuzz,
# Fontconfig, libxkbcommon, Qt 6, and other user-space libraries for
# VeridianOS from a Linux host.

[binaries]
c = 'x86_64-veridian-gcc'
cpp = 'x86_64-veridian-g++'
ar = 'x86_64-veridian-ar'
strip = 'x86_64-veridian-strip'
ranlib = 'x86_64-veridian-ranlib'
pkgconfig = 'pkg-config'

[host_machine]
system = 'veridian'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[properties]
sys_root = '/opt/veridian-sysroot'
pkg_config_libdir = '/opt/veridian-sysroot/usr/lib/pkgconfig'
needs_exe_wrapper = true

[built-in options]
c_args = ['--sysroot=/opt/veridian-sysroot', '-I/opt/veridian-sysroot/usr/include']
cpp_args = ['--sysroot=/opt/veridian-sysroot', '-I/opt/veridian-sysroot/usr/include']
c_link_args = ['--sysroot=/opt/veridian-sysroot', '-L/opt/veridian-sysroot/usr/lib']
cpp_link_args = ['--sysroot=/opt/veridian-sysroot', '-L/opt/veridian-sysroot/usr/lib']
