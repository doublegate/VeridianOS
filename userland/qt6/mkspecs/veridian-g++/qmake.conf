# Qt mkspec for cross-compiling Qt 6 to VeridianOS using GCC.
# Install to: <qt6-src>/mkspecs/veridian-g++/qmake.conf
#

MAKEFILE_GENERATOR  = UNIX
CONFIG             += incremental
QMAKE_INCREMENTAL_STYLE = sublib

include(../common/linux.conf)
include(../common/gcc-base-unix.conf)
include(../common/g++-unix.conf)

# -------------------------------------------------------------------------
# Platform identification
# -------------------------------------------------------------------------
QMAKE_PLATFORM      = veridian

# -------------------------------------------------------------------------
# Cross-compilation toolchain
# -------------------------------------------------------------------------
QMAKE_CC            = x86_64-veridian-gcc
QMAKE_CXX           = x86_64-veridian-g++
QMAKE_LINK          = x86_64-veridian-g++
QMAKE_LINK_SHLIB    = x86_64-veridian-g++
QMAKE_AR            = x86_64-veridian-ar cqs
QMAKE_RANLIB        = x86_64-veridian-ranlib
QMAKE_STRIP         = x86_64-veridian-strip
QMAKE_OBJCOPY       = x86_64-veridian-objcopy
QMAKE_NM            = x86_64-veridian-nm

# -------------------------------------------------------------------------
# Sysroot
# -------------------------------------------------------------------------
VERIDIAN_SYSROOT     = /opt/veridian-sysroot

# -------------------------------------------------------------------------
# Compiler flags
# -------------------------------------------------------------------------
QMAKE_CFLAGS        += --sysroot=$$VERIDIAN_SYSROOT
QMAKE_CFLAGS        += -I$$VERIDIAN_SYSROOT/usr/include
QMAKE_CFLAGS        += -fPIC

QMAKE_CXXFLAGS      += --sysroot=$$VERIDIAN_SYSROOT
QMAKE_CXXFLAGS      += -I$$VERIDIAN_SYSROOT/usr/include
QMAKE_CXXFLAGS      += -fPIC -std=c++17

# -------------------------------------------------------------------------
# Linker flags
# -------------------------------------------------------------------------
QMAKE_LFLAGS        += --sysroot=$$VERIDIAN_SYSROOT
QMAKE_LFLAGS        += -L$$VERIDIAN_SYSROOT/usr/lib
QMAKE_LFLAGS        += -Wl,-rpath-link,$$VERIDIAN_SYSROOT/usr/lib

# -------------------------------------------------------------------------
# Include / library search paths
# -------------------------------------------------------------------------
QMAKE_INCDIR         = $$VERIDIAN_SYSROOT/usr/include
QMAKE_LIBDIR         = $$VERIDIAN_SYSROOT/usr/lib

# -------------------------------------------------------------------------
# EGL / OpenGL ES 2.0 (Mesa)
# -------------------------------------------------------------------------
QMAKE_INCDIR_EGL     = $$VERIDIAN_SYSROOT/usr/include
QMAKE_LIBDIR_EGL     = $$VERIDIAN_SYSROOT/usr/lib
QMAKE_LIBS_EGL       = -lEGL

QMAKE_INCDIR_OPENGL_ES2 = $$VERIDIAN_SYSROOT/usr/include
QMAKE_LIBDIR_OPENGL_ES2 = $$VERIDIAN_SYSROOT/usr/lib
QMAKE_LIBS_OPENGL_ES2   = -lGLESv2

# -------------------------------------------------------------------------
# Wayland
# -------------------------------------------------------------------------
QMAKE_INCDIR_WAYLAND = $$VERIDIAN_SYSROOT/usr/include
QMAKE_LIBDIR_WAYLAND = $$VERIDIAN_SYSROOT/usr/lib
QMAKE_LIBS_WAYLAND_CLIENT = -lwayland-client
QMAKE_LIBS_WAYLAND_SERVER = -lwayland-server

# -------------------------------------------------------------------------
# D-Bus
# -------------------------------------------------------------------------
QMAKE_LIBS_DBUS      = -ldbus-1

# -------------------------------------------------------------------------
# pkg-config
# -------------------------------------------------------------------------
PKG_CONFIG           = pkg-config
PKG_CONFIG_SYSROOT_DIR = $$VERIDIAN_SYSROOT
PKG_CONFIG_LIBDIR    = $$VERIDIAN_SYSROOT/usr/lib/pkgconfig:$$VERIDIAN_SYSROOT/usr/share/pkgconfig

load(qt_config)
